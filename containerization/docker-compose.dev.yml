services:

  api1:
    build:
      context: ..
      dockerfile: containerization/Dockerfile
    ports:
      - "8080:8080"
    container_name: fraud-detector-1
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

networks:
  default:
    driver: bridge
