global
    maxconn 512
    nbthread 1
    daemon

defaults
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:9999
    default_backend fraud_detector

backend fraud_detector
    balance roundrobin
    option httpchk GET /ready
    default-server inter 3s fall 3 rise 2
    server api1 api1:8080 check
    server api2 api2:8080 check
